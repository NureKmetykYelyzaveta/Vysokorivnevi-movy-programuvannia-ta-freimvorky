<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Курс валют</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            color: #222;
        }

        header {
            background: #1f2937;
            padding: 20px;
            color: white;
            text-align: center;
        }

        nav {
            background: #111827;
            padding: 12px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #60a5fa;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
        }

        h1, h2 {
            text-align: center;
        }

        form {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 15px;
        }

        button, .button-link {
            display: inline-block;
            background: #2563eb;
            color: white;
            border: none;
            padding: 11px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: none;
        }

        button:hover, .button-link:hover {
            background: #1d4ed8;
        }

        .save-button {
            background: #16a34a;
            margin-bottom: 20px;
        }

        .save-button:hover {
            background: #15803d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th {
            background: #1f2937;
            color: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #d1d5db;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .empty {
            text-align: center;
            color: #777;
            font-style: italic;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>Сайт курсу валют</h1>
</header>

<nav>
    <a href="{% url 'index' %}">Поточні курси</a>
    <a href="{% url 'saved_rates' %}">Результати дня</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
