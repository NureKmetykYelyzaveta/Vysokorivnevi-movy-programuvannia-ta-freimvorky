<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Перевірка JSON</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }

        h1 {
            color: #333333;
            text-align: center;
        }

        .container {
            width: 600px;
            max-width: 90%;
            margin: 0 auto;
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        textarea {
            width: 100%;
            height: 200px;
            font-size: 16px;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background-color: #3e8e41;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .valid {
            color: green;
        }

        .invalid {
            color: red;
        }
    </style>
</head>
<body>

    <h1>Перевірка JSON</h1>

    <div class="container">
        <p>Введіть JSON-текст:</p>

        <textarea id="jsonInput">
{
  "name": "Єлизавета",
  "age": 18,
  "hobbies": ["малювання", "програмування", "музика"]
}
        </textarea>

        <br>

        <button onclick="checkJSON()">Перевірити JSON</button>

        <p id="result"></p>
    </div>

    <script>
        function checkJSON() {
            const jsonText = document.getElementById("jsonInput").value;
            const result = document.getElementById("result");

            try {
                JSON.parse(jsonText);

                result.textContent = "Дійсний JSON";
                result.className = "valid";
            } catch (error) {
                result.textContent = "Недійсний JSON";
                result.className = "invalid";
            }
        }
    </script>

</body>
</html>
